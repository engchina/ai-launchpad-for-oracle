name: Dependency Audit

# 依存パッケージの既知脆弱性を週次で監査する。
# Oracle / ADB を扱うため、high 以上の脆弱性を検出したら失敗扱いにする。
on:
  schedule:
    # 毎週月曜 09:00 JST (00:00 UTC)
    - cron: "0 0 * * 1"
  pull_request:
    paths:
      - ".github/workflows/dependency-audit.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level high
