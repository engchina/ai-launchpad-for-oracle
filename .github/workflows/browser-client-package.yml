name: Browser Client Package

on:
  workflow_dispatch:
  push:
    tags:
      - "browser-client-v*"

concurrency:
  group: browser-client-package-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            artifact: windows-x64
          - label: macOS universal
            os: macos-latest
            artifact: macos-universal
          - label: Linux x64
            os: ubuntu-22.04
            artifact: linux-x64

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/browser-client-v')
        run: |
          release_version="${GITHUB_REF_NAME#browser-client-v}"
          root_version="$(node -p "require('./package.json').version")"
          browser_version="$(node -p "require('./apps/browser/package.json').version")"

          if [ "$root_version" != "$release_version" ] || [ "$browser_version" != "$release_version" ]; then
            echo "Release tag と package version が一致していません。" >&2
            echo "tag=${GITHUB_REF_NAME} root=${root_version} browser=${browser_version}" >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @ai-launchpad/browser typecheck

      - name: Lint
        run: pnpm --filter @ai-launchpad/browser lint

      - name: Test knowledge contracts
        run: pnpm --filter @ai-launchpad/browser test:knowledge

      - name: Build Electron app
        run: pnpm --filter @ai-launchpad/browser build

      - name: Build distributable package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx --yes electron-builder@26.8.1 --projectDir apps/browser --config ../../.github/electron-builder.browser-client.yml --publish never

      - name: List package artifacts
        run: find artifacts/browser-client -maxdepth 2 -type f | sort

      - name: Prepare release asset files
        run: |
          mkdir -p artifacts/browser-client-release
          found=0

          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            cp "$file" "artifacts/browser-client-release/${name}"
            found=1
          done < <(find artifacts/browser-client -maxdepth 1 -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -print0)

          if [ "$found" -eq 0 ]; then
            echo "Release asset に含める package file が見つかりません。" >&2
            exit 1
          fi

          find artifacts/browser-client-release -maxdepth 1 -type f | sort

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-client-${{ matrix.artifact }}
          path: artifacts/browser-client-release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/browser-client-v')
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: browser-client-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat > "$notes_file" <<'NOTES'
          GitHub Actions で生成した未署名の Browser Client package artifact です。

          インストール / 実行時の注意:
          - Windows installer と macOS DMG は未署名です。
          - Linux AppImage は起動前に chmod +x が必要になる場合があります。
          - Linux package は AppImage、deb、rpm を生成します。
          - この workflow は secret、OCI credential、ADB wallet、顧客データを含めません。
          NOTES

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "AI Launchpad Browser Client ${RELEASE_TAG}" --notes-file "$notes_file"
          fi

          mapfile -d '' assets < <(find release-assets -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "Release asset がダウンロードされていません。" >&2
            exit 1
          fi

          if find release-assets -type f ! \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -print -quit | grep -q .; then
            echo "Release 対象外の file が含まれています。" >&2
            find release-assets -type f ! \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) | sort >&2
            exit 1
          fi

          if ! find release-assets -type f \( -name '*.exe' -o -name '*.msi' \) -print -quit | grep -q .; then
            echo "Windows installer asset が見つかりません。" >&2
            exit 1
          fi

          if ! find release-assets -type f -name '*.dmg' -print -quit | grep -q .; then
            echo "macOS DMG asset が見つかりません。" >&2
            exit 1
          fi

          if ! find release-assets -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -print -quit | grep -q .; then
            echo "Linux installer asset が見つかりません。" >&2
            exit 1
          fi

          printf 'Release assets:\n'
          printf '%s\n' "${assets[@]}"

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
